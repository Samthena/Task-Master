{% extends 'base.html' %}

{% block head %}
<title>Task Master</title>
{% endblock %}

{% block body %}
<div class="content">
    <div class="center">
    <h1>Update Task</h1>
    
    <form action="/update/{{task.id}}" method="POST">
        <input type="text" name="content" id="content" value="{{task.content}}">
        <input type="submit" value="Update">
    </form>
    <br>
    <a href="{{ url_for('index') }}">Back</a>
</div>
</div>
{% endblock %}
